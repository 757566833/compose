services:
  jina-embeddings-v5-text-nano:
    image: jina-embeddings-v5-text-nano:latest
    container_name: jina-embeddings-v5-text-nano
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # 使用所有可用显卡
              capabilities: [gpu]
    ports:
      - "8003:8000"
    volumes:
      # 映射宿主机的 /tmp/whisper 到容器的 /tmp
      # 这样可以利用宿主机磁盘，且方便你在宿主机查看任务进度
      - ./temp_data:/tmp
    restart: always